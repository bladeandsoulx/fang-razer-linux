name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  debs:
    name: build .deb packages
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - run: >
          sudo apt-get update && sudo apt-get install -y --no-install-recommends
          libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
          libayatana-appindicator3-dev libudev-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build fangd .deb
        run: |
          cargo install cargo-deb --locked
          cargo deb -p fangd
      - name: Build app .deb
        working-directory: app
        run: |
          npm ci
          npm run tauri build -- --bundles deb
      - name: Collect .deb packages
        run: |
          mkdir -p target/deb-dist
          rm -f target/deb-dist/*.deb
          mapfile -t daemon_debs < <(find target/debian -maxdepth 1 -type f -name '*.deb' -print | sort)
          mapfile -t app_debs < <(find app/src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' -print | sort)
          test "${#daemon_debs[@]}" -eq 1
          test "${#app_debs[@]}" -eq 1
          cp "${daemon_debs[@]}" "${app_debs[@]}" target/deb-dist/
          mapfile -t debs < <(find target/deb-dist -maxdepth 1 -type f -name '*.deb' -print | sort)
          test "${#debs[@]}" -eq 2
      - uses: actions/upload-artifact@v4
        with:
          name: fang-debs
          path: target/deb-dist/*.deb
          if-no-files-found: error

  deb-test:
    name: test DEBs (${{ matrix.image }})
    needs: debs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ubuntu:22.04, ubuntu:24.04, debian:12, debian:13]
    container:
      image: ${{ matrix.image }}
    steps:
      - run: >
          apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y
          git ca-certificates systemd python3 dbus-x11 xvfb xauth
          desktop-file-utils procps
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: fang-debs
          path: target/deb-dist
      - run: packaging/deb/verify.sh target/deb-dist

  rpms:
    name: build RPMs (Fedora 43)
    runs-on: ubuntu-latest
    container: fedora:43
    steps:
      - run: >
          dnf install -y
          git curl tar gzip gcc gcc-c++ make pkgconf-pkg-config systemd-devel
          webkit2gtk4.1-devel gtk3-devel librsvg2-devel
          libayatana-appindicator-gtk3-devel openssl-devel
          rpm-build desktop-file-utils findutils
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            app/src-tauri
      - run: packaging/rpm/build.sh target/rpm-dist
      - uses: actions/upload-artifact@v4
        with:
          name: fang-rpms
          path: target/rpm-dist/*.rpm
          if-no-files-found: error

  rpm-test:
    name: test RPMs (${{ matrix.fedora }})
    needs: rpms
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fedora: [43, 44]
    container:
      image: fedora:${{ matrix.fedora }}
    steps:
      - run: >
          dnf install -y
          git tar gzip rpm-build systemd systemd-rpm-macros desktop-file-utils
          python3 dbus-daemon xorg-x11-server-Xvfb xorg-x11-xauth
          libayatana-appindicator-gtk3 findutils procps-ng
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: fang-rpms
          path: target/rpm-dist
      - run: packaging/rpm/verify.sh target/rpm-dist

  draft-release:
    name: create four-package draft release
    needs: [deb-test, rpm-test]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: fang-debs
          path: dist/deb
      - uses: actions/download-artifact@v4
        with:
          name: fang-rpms
          path: dist/rpm
      - name: Verify release identity
        run: |
          node app/scripts/version.mjs check
          version="$(node -p "require('./app/package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            printf 'release tag %s does not match manifest version v%s\n' "$GITHUB_REF_NAME" "$version" >&2
            exit 1
          fi
      - name: Verify release inventory
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          version="$(node -p "require('./app/package.json').version")"
          mapfile -t debs < <(find dist/deb -type f -name '*.deb' -print | sort)
          mapfile -t rpms < <(find dist/rpm -type f -name '*.rpm' -print | sort)
          test "${#debs[@]}" -eq 2
          test "${#rpms[@]}" -eq 2
          fang_deb="dist/deb/Fang_${version}_amd64.deb"
          fangd_deb="dist/deb/fangd_${version}-1_amd64.deb"
          fang_rpm="dist/rpm/fang-${version}-1.x86_64.rpm"
          fangd_rpm="dist/rpm/fangd-${version}-1.x86_64.rpm"
          for package in "$fang_deb" "$fangd_deb" "$fang_rpm" "$fangd_rpm"; do
            test -f "$package"
          done

          verify_deb() {
            local package="$1"
            local expected_name="$2"
            local expected_version="$3"
            test "$(dpkg-deb -f "$package" Package)" = "$expected_name"
            test "$(dpkg-deb -f "$package" Version)" = "$expected_version"
            test "$(dpkg-deb -f "$package" Architecture)" = "amd64"
          }
          verify_deb "$fang_deb" fang "$version"
          verify_deb "$fangd_deb" fangd "${version}-1"

          verify_rpm() {
            local package="$1"
            local expected_name="$2"
            test "$(rpm -qp --queryformat '%{NAME}' "$package")" = "$expected_name"
            test "$(rpm -qp --queryformat '%{VERSION}' "$package")" = "$version"
            test "$(rpm -qp --queryformat '%{RELEASE}' "$package")" = "1"
            test "$(rpm -qp --queryformat '%{ARCH}' "$package")" = "x86_64"
          }
          verify_rpm "$fang_rpm" fang
          verify_rpm "$fangd_rpm" fangd
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/deb/*.deb
            dist/rpm/*.rpm
