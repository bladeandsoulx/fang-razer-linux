name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-checks:
    name: installer + release contracts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck
      - run: node app/scripts/version.mjs check
      - run: node --test app/scripts/version.test.mjs
      - run: node packaging/installer/installer.test.mjs
      - run: node packaging/release/release-contract.test.mjs
      - run: node packaging/release/publish.test.mjs
      - run: node packaging/deb/verify.test.mjs
      - run: node --test packaging/rpm/build-script.test.mjs packaging/rpm/metadata.test.mjs
      - run: >
          shellcheck install.sh packaging/install.sh packaging/deb/verify.sh
          packaging/rpm/build.sh packaging/rpm/verify.sh packaging/release/publish.sh

  debs:
    name: build .deb packages
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - run: >
          sudo apt-get update && sudo apt-get install -y --no-install-recommends
          libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
          libayatana-appindicator3-dev libudev-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build fangd .deb
        run: |
          cargo install cargo-deb --locked
          cargo deb -p fangd
      - name: Build app .deb
        working-directory: app
        run: |
          npm ci
          npm run tauri build -- --bundles deb
      - name: Collect .deb packages
        run: |
          mkdir -p target/deb-dist
          rm -f target/deb-dist/*.deb
          mapfile -t daemon_debs < <(find target/debian -maxdepth 1 -type f -name '*.deb' -print | sort)
          mapfile -t app_debs < <(find app/src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' -print | sort)
          test "${#daemon_debs[@]}" -eq 1
          test "${#app_debs[@]}" -eq 1
          cp "${daemon_debs[@]}" "${app_debs[@]}" target/deb-dist/
          mapfile -t debs < <(find target/deb-dist -maxdepth 1 -type f -name '*.deb' -print | sort)
          test "${#debs[@]}" -eq 2
      - uses: actions/upload-artifact@v4
        with:
          name: fang-debs
          path: target/deb-dist/*.deb
          if-no-files-found: error

  deb-test:
    name: test DEBs (${{ matrix.image }})
    needs: debs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ubuntu:22.04, ubuntu:24.04, debian:12, debian:13]
    container:
      image: ${{ matrix.image }}
    steps:
      - run: >
          apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y
          git ca-certificates systemd python3 dbus-x11 xvfb xauth
          desktop-file-utils procps
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: fang-debs
          path: target/deb-dist
      - run: packaging/deb/verify.sh target/deb-dist

  rpms:
    name: build RPMs (Fedora 43)
    runs-on: ubuntu-latest
    container: fedora:43
    steps:
      - run: >
          dnf install -y
          git curl tar gzip gcc gcc-c++ make pkgconf-pkg-config systemd-devel
          webkit2gtk4.1-devel gtk3-devel librsvg2-devel
          libayatana-appindicator-gtk3-devel openssl-devel
          rpm-build desktop-file-utils findutils
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            app/src-tauri
      - run: packaging/rpm/build.sh target/rpm-dist
      - uses: actions/upload-artifact@v4
        with:
          name: fang-rpms
          path: target/rpm-dist/*.rpm
          if-no-files-found: error

  rpm-test:
    name: test RPMs (${{ matrix.fedora }})
    needs: rpms
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fedora: [43, 44]
    container:
      image: fedora:${{ matrix.fedora }}
    steps:
      - run: >
          dnf install -y
          git tar gzip rpm-build systemd systemd-rpm-macros desktop-file-utils
          python3 dbus-daemon xorg-x11-server-Xvfb xorg-x11-xauth
          libayatana-appindicator-gtk3 findutils procps-ng
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: fang-rpms
          path: target/rpm-dist
      - run: packaging/rpm/verify.sh target/rpm-dist

  publish:
    name: publish immutable six-asset release
    needs: [release-checks, debs, deb-test, rpms, rpm-test]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: fang-debs
          path: dist/deb
      - uses: actions/download-artifact@v4
        with:
          name: fang-rpms
          path: dist/rpm
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Stage exact release inventory
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm
          node app/scripts/version.mjs check
          version="$(node -p "require('./app/package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            printf 'release tag %s does not match manifest version v%s\n' "$GITHUB_REF_NAME" "$version" >&2
            exit 1
          fi
          node packaging/release/release-contract.mjs stage \
            "$version" dist/deb dist/rpm dist/release install.sh
      - name: Publish one immutable release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          IMMUTABLE_RELEASES_TOKEN: ${{ secrets.IMMUTABLE_RELEASES_TOKEN }}
        run: packaging/release/publish.sh dist/release "$GITHUB_REF_NAME"
